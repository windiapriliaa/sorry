<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Buat Kamu ❤️</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }

        body {
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #ffd6e7, #ffeef7);
            overflow: hidden;
        }

        .card {
            background: white;
            width: 360px;
            padding: 30px;
            border-radius: 20px;
            text-align: center;
            box-shadow: 0 15px 35px rgba(0, 0, 0, .15);
            z-index: 10;
        }

        h1 {
            color: #ff4d88;
            margin-bottom: 15px;
        }

        p {
            color: #555;
            line-height: 1.7;
            margin-bottom: 25px;
        }

        button {
            border: none;
            padding: 12px 24px;
            border-radius: 10px;
            cursor: pointer;
            font-size: 16px;
            transition: .2s;
        }

        #yes {
            background: #ff4d88;
            color: white;
        }

        #yes:hover {
            transform: scale(1.05);
        }

        #no {
            position: absolute;
            background: #ddd;
        }

        .heart {
            position: absolute;
            color: #ff4d88;
            animation: fall linear infinite;
            pointer-events: none;
        }

        @keyframes fall {
            from {
                transform: translateY(-10vh);
                opacity: 1;
            }

            to {
                transform: translateY(110vh);
                opacity: 0;
            }
        }
    </style>

</head>

<body>

    <div class="card">

        <h1>Maafin Aku Ya</h1>

        <p>
            Hai...

            <br><br>

            Aku tahu aku salah.
            Maaf ya kalau kemarin aku bikin kamu kecewa atau kesel.

            Aku nggak bisa ngubah apa yang udah terjadi,
            tapi aku bisa belajar supaya nggak ngulangin lagi.

            <br><br>

            Mau maafin aku? 🤍
        </p>

        <button id="yes">
            Dimaafin ❤️
        </button>

    </div>

    <button id="no">
        Nggak 😤
    </button>

    <script>

        // Tombol "Nggak" kabur
        const noBtn = document.getElementById("no");

        function kabur() {

            const x = Math.random() * (window.innerWidth - 120);
            const y = Math.random() * (window.innerHeight - 60);

            noBtn.style.left = x + "px";
            noBtn.style.top = y + "px";

        }

        kabur();

        noBtn.addEventListener("mouseenter", kabur);

        noBtn.addEventListener("touchstart", e => {
            e.preventDefault();
            kabur();
        });

        // Hujan hati
        function buatHati() {

            const heart = document.createElement("div");

            heart.className = "heart";

            heart.innerHTML = "❤️";

            heart.style.left = Math.random() * 100 + "vw";
            heart.style.fontSize = (Math.random() * 20 + 15) + "px";
            heart.style.animationDuration = (Math.random() * 3 + 3) + "s";

            document.body.appendChild(heart);

            setTimeout(() => {
                heart.remove();
            }, 6000);

        }

        setInterval(buatHati, 350);

        // Tombol iya
        document.getElementById("yes").onclick = () => {

            document.body.innerHTML = `

<div style="height:100vh;display:flex;justify-content:center;align-items:center;flex-direction:column;background:linear-gradient(135deg,#ffd6e7,#ffeef7);text-align:center;padding:20px;">

<h1 style="font-size:50px;color:#ff4d88;">
</h1>

<h2>
Makasih ya udah maafin aku.
</h2>

<p style="max-width:500px;font-size:18px;margin-top:20px;color:#555;">
Aku janji bakal belajar dari kesalahan ini.
aku bakal berusaha buat selalu ngertiin kamu. maaf bangett yaa, 
harus dimaafin pokoknya!!!
. 🤍
</p>

<h1 style="margin-top:30px;">
🤍✨
</h1>

</div>

`;

            setInterval(() => {

                const h = document.createElement("div");

                h.className = "heart";
                h.innerHTML = "💖";

                h.style.left = Math.random() * 100 + "vw";
                h.style.fontSize = (Math.random() * 30 + 20) + "px";
                h.style.animationDuration = "3s";

                document.body.appendChild(h);

                setTimeout(() => {
                    h.remove();
                }, 3000);

            }, 120);

        };

    </script>

</body>

</html>
